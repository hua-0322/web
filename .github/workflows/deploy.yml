name: Node.js CI/CD检验

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    - name: Install dependencies
      working-directory: ./server
      run: npm install
    - name: Run tests
      working-directory: ./server
      run: npm test